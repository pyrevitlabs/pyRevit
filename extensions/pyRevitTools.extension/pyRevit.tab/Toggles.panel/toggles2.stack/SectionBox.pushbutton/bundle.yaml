title:
  en_us: Section Box
  fr_fr: Zone de coupe
  ru: Края 3D вида
  chinese_s: 剖面框
  es_es: Caja de sección
  de_de: 3D-Schnittbereich
  pt_br: Caixa de Corte
tooltip:
  en_us: >-
    Toggles either the visibility or the active state of the section box; or temporarily switches to a sectionbox around selected objects in the current 3D view — depending on configuration (shift + click). In active mode, the current box is saved when disabled and restored when re-enabled.
  fr_fr: >-
    Bascule soit la visibilité, soit l’état actif de la boîte de section ; ou bascule temporairement vers une boîte de section entourant les objets sélectionnés dans la vue 3D actuelle — selon la configuration (Maj + clic). En mode actif, la boîte actuelle est enregistrée lors de la désactivation et restaurée lors de la réactivation.

  ru: >-
    Переключает либо видимость, либо активное состояние секционной рамки; либо временно переключается на секционную рамку вокруг выбранных объектов в текущем 3D-виде — в зависимости от конфигурации (Shift + клик). В активном режиме текущая рамка сохраняется при отключении и восстанавливается при повторном включении.

  chinese_s: >-
    根据配置，在当前三维视图中切换剖面框的可见性或活动状态；或通过 Shift + 单击 临时切换为包围所选对象的剖面框。在活动模式下，禁用时会保存当前框体，重新启用时将其恢复。

  es_es: >-
    Alterna la visibilidad o el estado activo de la caja de sección; o cambia temporalmente a una caja de sección alrededor de los objetos seleccionados en la vista 3D actual — según la configuración (Mayús + clic). En modo activo, la caja actual se guarda al desactivarse y se restaura al volver a activarse.

  de_de: >-
    Schaltet entweder die Sichtbarkeit oder den aktiven Zustand der Schnittbox um; oder wechselt vorübergehend zu einer Schnittbox um die ausgewählten Objekte in der aktuellen 3D-Ansicht — abhängig von der Konfiguration (Umschalt + Klick). Im Aktivmodus wird die aktuelle Box beim Deaktivieren gespeichert und beim erneuten Aktivieren wiederhergestellt.

  pt_br: >-
    Alterna a visibilidade ou o estado ativo da caixa de seção; ou muda temporariamente para uma caixa de seção ao redor dos objetos selecionados na visualização 3D atual — dependendo da configuração (Shift + clique). No modo ativo, a caixa atual é salva ao ser desativada e restaurada ao ser reativada.